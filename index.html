<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f8cfe0" />
  <title>I'm Sorry ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-3" aria-hidden="true"></div>

  <div class="floating-layer" id="hearts" aria-hidden="true"></div>
  <div class="sparkle-layer" id="sparkles" aria-hidden="true"></div>

  <main class="page-shell">
    <section class="hero-card" aria-label="Apology message">
      <div class="hero-top">
        <div class="small-badge">A little message</div>
        <div class="mini-heart" aria-hidden="true">💗</div>
      </div>

      <div class="main-icon" aria-hidden="true">
        <div class="icon-ring"></div>
        <div class="icon-core">💙</div>
      </div>

      <h1 class="title">I'm Sorry...</h1>

      <p class="subtitle">
        I know I made mistakes, and I wanted to say it in the most beautiful way I could.
      </p>

      <p class="typing-line" id="typingText"></p>

      <div class="divider" aria-hidden="true"></div>

      <div class="button-row">
        <button id="yesBtn" class="btn btn-yes" type="button">
          Forgive Me ❤️
        </button>

        <button id="noBtn" class="btn btn-no" type="button">
          No 😤
        </button>
      </div>

      <p class="tiny-note">
        Tap the button that feels right.
      </p>
    </section>
  </main>

  <section id="successScreen" class="success-screen hidden" aria-hidden="true">
    <div class="success-card">
      <div class="success-heart" aria-hidden="true">❤️</div>
      <h2>Thank You</h2>
      <p>You just made my day.</p>
      <p>I promise to do better from today onwards.</p>
      <button id="restart" class="btn btn-restart" type="button">
        Replay ✨
      </button>
    </div>
  </section>

  <canvas id="confetti" aria-hidden="true"></canvas>

  <noscript>
    <div style="padding:16px;text-align:center;font-family:Poppins,sans-serif;">
      This page needs JavaScript enabled for the buttons and animations to work.
    </div>
  </noscript>

  <script src="script.js"></script>
</body>
</html>
